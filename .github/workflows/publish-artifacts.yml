name: Publish Artifacts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'artifacts/**'
      - '.github/workflows/publish-artifacts.yml'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to JFrog Fly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Upload generic config artifact
        uses: jfrog/fly-action/upload@v1
        with:
          name: od-sifra-config
          version: ${{ github.sha }}
          files: |
            artifacts/generic/deployment-config.json
            artifacts/generic/env-staging.json

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: helm package artifacts/helm --destination /tmp/helm-pkg

      - name: Push Helm chart to Fly
        run: helm push /tmp/helm-pkg/*.tgz oci://${{ env.FLY_REGISTRY_SUBDOMAIN }}/helmoci

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Go modules through Fly
        run: go mod download
        working-directory: artifacts/go

      - name: Build Go binary
        run: go build -o /tmp/od-sifra-healthcheck ./main.go
        working-directory: artifacts/go

      - name: Upload Go binary artifact
        uses: jfrog/fly-action/upload@v1
        with:
          name: od-sifra-go-healthcheck
          version: ${{ github.sha }}
          files: /tmp/od-sifra-healthcheck
